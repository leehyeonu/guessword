version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: malmatch-backend
    ports:
      - "8000:7860"
    volumes:
      # Bind mount the host's models directory to the container.
      # WORKDIR is set to /home/user/app in the runtime stage, so map accordingly.
      - ./models:/home/user/app/models
    environment:
      - PYTHONUNBUFFERED=1
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, sys; res = urllib.request.urlopen('http://localhost:7860/health'); sys.exit(0) if res.status == 200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 8g       # Set upper cap memory to 8GB (ideal for Oracle ARM VM configs)
        reservations:
          memory: 4g       # Pre-allocate 4GB at startup
    restart: unless-stopped
